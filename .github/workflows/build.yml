# ============================================================
# GitHub Actions 工作流:Android CI Build
# 用途:TalkifyTTS Android 项目自动化编译与测试
# 触发:push 到 main、PR 到 main、推送 v* Tag、手动触发
# 产物:Debug APK、未签名 Release APK、单元测试报告
# ============================================================

name: Android CI Build

on:
  # 推送到 main 分支时触发
  push:
    branches:
      - main
    # 仅匹配 v 开头的 Tag(如 v1.0.0)
    tags:
      - 'v*'
  # 针对 main 分支的 PR 触发
  pull_request:
    branches:
      - main
  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# 取消同分支上一次正在运行的旧工作流,避免重复构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 构建并测试
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. 检出仓库代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 配置 JDK 17(Temurin),并启用 Gradle 依赖缓存
      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # 3. 配置 Gradle wrapper(读取 gradle/wrapper 内的版本),启用 Gradle 构建缓存
      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') }}

      # 4. 为 gradlew 脚本赋予可执行权限(Windows 提交不保留 +x 位)
      - name: 赋予 gradlew 执行权限
        run: chmod +x ./gradlew

      # 5. 运行 Debug 变体的单元测试
      - name: 运行单元测试
        run: ./gradlew testDebugUnitTest --stacktrace

      # 6. 构建 Debug APK
      - name: 构建 Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 7. 构建 Release APK(未签名)
      - name: 构建 Release APK
        run: ./gradlew assembleRelease --stacktrace

      # 8. 上传单元测试报告(失败时也上传,便于排查)
      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.sha }}
          path: app/build/reports/tests/
          retention-days: 30
          if-no-files-found: warn

      # 9. 上传 Debug APK 产物
      - name: 上传 Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Talkify-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      # 10. 上传未签名 Release APK 产物
      - name: 上传 Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Talkify-release-unsigned-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error
